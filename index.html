<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px;
      min-height: 100vh;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
      color: #e94560;
    }

    #status {
      font-size: 1.1rem;
      margin-bottom: 20px;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 8px;
      /* width and height set by JS */
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: pointer;
      /* width, height, font-size set by JS */
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }
    .cell.win { background: #0f3460; }

    #reset {
      margin-top: 24px;
      padding: 12px 32px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: white;
      cursor: pointer;
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 20px;
      font-size: 1rem;
    }

    .score-item { text-align: center; }
    .score-item span { display: block; font-size: 1.6rem; font-weight: bold; }
    .score-item.xs span { color: #e94560; }
    .score-item.os span { color: #a8dadc; }
    .score-item.ds span { color: #aaa; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">Your turn (X)</div>
  <div id="board"></div>
  <button id="reset">New Game</button>
  <div id="score">
    <div class="score-item xs">You (X) <span id="x-wins">0</span></div>
    <div class="score-item ds">Draws <span id="draws">0</span></div>
    <div class="score-item os">AI (O) <span id="o-wins">0</span></div>
  </div>

  <script>
    var WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    var board, current, over, aiThinking, score = { X: 0, O: 0, D: 0 };
    var boardEl = document.getElementById('board');
    var statusEl = document.getElementById('status');

    // Size the board based on screen width
    var boardSize = Math.min(window.innerWidth - 32, 360);
    var cellSize = Math.floor((boardSize - 16) / 3);
    var fontSize = Math.floor(cellSize * 0.5);

    boardEl.style.width = boardSize + 'px';
    boardEl.style.height = boardSize + 'px';

    function init() {
      board = ['','','','','','','','',''];
      current = 'X';
      over = false;
      aiThinking = false;
      statusEl.textContent = 'Your turn (X)';
      boardEl.innerHTML = '';
      for (var i = 0; i < 9; i++) {
        var cell = document.createElement('div');
        cell.className = 'cell';
        cell.style.width = cellSize + 'px';
        cell.style.height = cellSize + 'px';
        cell.style.fontSize = fontSize + 'px';
        cell.setAttribute('data-i', i);
        cell.addEventListener('click', handleClick);
        boardEl.appendChild(cell);
      }
    }

    function placeMove(i, player) {
      board[i] = player;
      var cell = boardEl.children[i];
      cell.textContent = player;
      cell.classList.add(player.toLowerCase());
    }

    function handleClick(e) {
      var i = parseInt(e.currentTarget.getAttribute('data-i'));
      if (over || board[i] || aiThinking || current !== 'X') return;
      placeMove(i, 'X');

      if (resolveState('X')) return;

      current = 'O';
      statusEl.textContent = 'AI is thinking...';
      aiThinking = true;
      setTimeout(aiMove, 300);
    }

    function aiMove() {
      var best = minimax(board, 'O', 0);
      placeMove(best.index, 'O');
      aiThinking = false;
      if (resolveState('O')) return;
      current = 'X';
      statusEl.textContent = 'Your turn (X)';
    }

    // Returns true if game ended after player's move
    function resolveState(player) {
      var win = checkWin(board);
      if (win) {
        for (var w = 0; w < win.length; w++) {
          boardEl.children[win[w]].classList.add('win');
        }
        statusEl.textContent = player === 'X' ? 'You win!' : 'AI wins!';
        score[player]++;
        updateScore();
        over = true;
        return true;
      } else if (board.join('').length === 9) {
        statusEl.textContent = "It's a draw!";
        score.D++;
        updateScore();
        over = true;
        return true;
      }
      return false;
    }

    function checkWin(b) {
      for (var i = 0; i < WINS.length; i++) {
        var a = WINS[i][0], bx = WINS[i][1], c = WINS[i][2];
        if (b[a] && b[a] === b[bx] && b[bx] === b[c]) return WINS[i];
      }
      return null;
    }

    function minimax(b, player, depth) {
      var win = checkWin(b);
      if (win) return { score: player === 'X' ? 10 - depth : depth - 10 };
      var empty = [];
      for (var i = 0; i < 9; i++) { if (!b[i]) empty.push(i); }
      if (!empty.length) return { score: 0 };

      var best = player === 'O'
        ? { score: -Infinity }
        : { score: Infinity };

      for (var j = 0; j < empty.length; j++) {
        var idx = empty[j];
        b[idx] = player;
        var result = minimax(b, player === 'O' ? 'X' : 'O', depth + 1);
        b[idx] = '';
        result.index = idx;
        if (player === 'O') {
          if (result.score > best.score) best = result;
        } else {
          if (result.score < best.score) best = result;
        }
      }
      return best;
    }

    function updateScore() {
      document.getElementById('x-wins').textContent = score.X;
      document.getElementById('o-wins').textContent = score.O;
      document.getElementById('draws').textContent = score.D;
    }

    document.getElementById('reset').addEventListener('click', init);
    init();
  </script>
</body>
</html>
