<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      padding: 10px 16px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      color: #e94560;
      flex-shrink: 0;
    }

    #scoreboard {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      width: 100%;
      max-width: 380px;
      flex-shrink: 0;
    }

    .score-card {
      flex: 1;
      background: #16213e;
      border-radius: 10px;
      padding: 6px 4px;
      text-align: center;
    }

    .score-card .label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.6;
      margin-bottom: 2px;
    }

    .score-card .name {
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .score-card .number {
      font-size: 1.8rem;
      font-weight: bold;
      line-height: 1;
    }

    .score-card.you .name, .score-card.you .number { color: #e94560; }
    .score-card.ai  .name, .score-card.ai  .number { color: #a8dadc; }
    .score-card.draws .number { color: #aaa; }

    .score-divider { font-size: 1rem; color: #555; flex-shrink: 0; }

    #status {
      font-size: 1rem;
      margin-bottom: 8px;
      color: #a8dadc;
      flex-shrink: 0;
      min-height: 1.3em;
    }

    #board-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 380px;
    }

    #board {
      width: 100%;
      aspect-ratio: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 10px;
      background: #4a7fb5;
      border-radius: 16px;
      padding: 10px;
    }

    .cell {
      background: #0d1b3e;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: min(13vw, 13vh);
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s;
    }

    .cell:hover:not(.x):not(.o) { background: #162848; }
    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }
    .cell.win { background: #1a4080; }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-shrink: 0;
    }

    button {
      padding: 10px 20px;
      font-size: 0.9rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #reset       { background: #e94560; color: white; }
    #reset-score { background: #16213e; color: #aaa; border: 1px solid #333; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="scoreboard">
    <div class="score-card you">
      <div class="label">Wins</div>
      <div class="name">You (X)</div>
      <div class="number" id="x-wins">0</div>
    </div>
    <div class="score-divider">vs</div>
    <div class="score-card draws">
      <div class="label">&nbsp;</div>
      <div class="name">Draws</div>
      <div class="number" id="draws">0</div>
    </div>
    <div class="score-divider">vs</div>
    <div class="score-card ai">
      <div class="label">Wins</div>
      <div class="name">AI (O)</div>
      <div class="number" id="o-wins">0</div>
    </div>
  </div>

  <div id="status">Your turn (X)</div>

  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <div class="buttons">
    <button id="reset">New Game</button>
    <button id="reset-score">Reset Scores</button>
  </div>

  <script>
    var WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    var board, current, over, aiThinking;
    var boardEl = document.getElementById('board');
    var statusEl = document.getElementById('status');

    var stored = JSON.parse(localStorage.getItem('ttt-score') || 'null');
    var score = stored || { X: 0, O: 0, D: 0 };
    updateScore();

    function init() {
      board = ['','','','','','','','',''];
      current = 'X';
      over = false;
      aiThinking = false;
      statusEl.textContent = 'Your turn (X)';
      boardEl.innerHTML = '';
      for (var i = 0; i < 9; i++) {
        var cell = document.createElement('div');
        cell.className = 'cell';
        cell.setAttribute('data-i', i);
        cell.addEventListener('click', handleClick);
        boardEl.appendChild(cell);
      }
    }

    function placeMove(i, player) {
      board[i] = player;
      var cell = boardEl.children[i];
      cell.textContent = player;
      cell.classList.add(player.toLowerCase());
    }

    function handleClick(e) {
      var i = parseInt(e.currentTarget.getAttribute('data-i'));
      if (over || board[i] || aiThinking || current !== 'X') return;
      placeMove(i, 'X');
      if (resolveState('X')) return;
      current = 'O';
      statusEl.textContent = 'AI is thinking...';
      aiThinking = true;
      setTimeout(aiMove, 300);
    }

    function aiMove() {
      var move = pickMove();
      placeMove(move, 'O');
      aiThinking = false;
      if (resolveState('O')) return;
      current = 'X';
      statusEl.textContent = 'Your turn (X)';
    }

    function findThreat(player) {
      for (var i = 0; i < WINS.length; i++) {
        var line = WINS[i];
        var empties = line.filter(function(idx) { return !board[idx]; });
        var filled  = line.filter(function(idx) { return board[idx] === player; });
        if (filled.length === 2 && empties.length === 1) return empties[0];
      }
      return -1;
    }

    function emptySquares() {
      var e = [];
      for (var i = 0; i < 9; i++) { if (!board[i]) e.push(i); }
      return e;
    }

    function pickMove() {
      var win = findThreat('O');
      if (win !== -1) return win;
      var block = findThreat('X');
      if (block !== -1) return block;
      var empty = emptySquares();
      return empty[Math.floor(Math.random() * empty.length)];
    }

    function resolveState(player) {
      var win = checkWin(board);
      if (win) {
        for (var w = 0; w < win.length; w++) {
          boardEl.children[win[w]].classList.add('win');
        }
        statusEl.textContent = player === 'X' ? 'You win!' : 'AI wins!';
        score[player]++;
        saveAndUpdateScore();
        over = true;
        return true;
      } else if (board.join('').length === 9) {
        statusEl.textContent = "It's a draw!";
        score.D++;
        saveAndUpdateScore();
        over = true;
        return true;
      }
      return false;
    }

    function checkWin(b) {
      for (var i = 0; i < WINS.length; i++) {
        var a = WINS[i][0], bx = WINS[i][1], c = WINS[i][2];
        if (b[a] && b[a] === b[bx] && b[bx] === b[c]) return WINS[i];
      }
      return null;
    }

    function saveAndUpdateScore() {
      localStorage.setItem('ttt-score', JSON.stringify(score));
      updateScore();
    }

    function updateScore() {
      document.getElementById('x-wins').textContent = score.X;
      document.getElementById('o-wins').textContent = score.O;
      document.getElementById('draws').textContent  = score.D;
    }

    document.getElementById('reset').addEventListener('click', init);
    document.getElementById('reset-score').addEventListener('click', function() {
      score = { X: 0, O: 0, D: 0 };
      saveAndUpdateScore();
    });

    init();
  </script>
</body>
</html>
